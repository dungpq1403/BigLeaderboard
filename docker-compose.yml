version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: solo_mysql_dev
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: solo_db
      MYSQL_USER: solo_user
      MYSQL_PASSWORD: solo_pass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data_dev:/var/lib/mysql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: solo_backend_dev
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - PORT=5000
      - DB_HOST=mysql
      - DB_USER=solo_user
      - DB_PASSWORD=root
      - DB_NAME=solo_db
      - DB_PORT=3306
    depends_on:
      - mysql

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: solo_frontend_dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api   # hoặc dùng tên service nếu gọi từ server-side
    depends_on:
      - backend

volumes:
  mysql_data_dev: