services:
  mysql:
    image: mysql:8.0
    container_name: solo_mysql_dev
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: BigLeaderboard
    ports:
      - "3307:3306"
    volumes:
      - mysql_data_dev:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: solo_backend_dev
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
      # Mount thư mục uploads của frontend vào đúng path mà imageUpload.js đang ghi tới
      # (path.join(__dirname, '../../frontend/public/uploads') tính từ /app/routes)
      - ./frontend/public/uploads:/frontend/public/uploads
    environment:
      - PORT=5000
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_NAME=BigLeaderboard
      - JWT_SECRET=bigleaderboard_super_secret_key
      # Bật polling để hot-reload hoạt động trên bind mount của Windows
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=500
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: solo_frontend_dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      # URL browser dùng để gọi backend (chạy ngoài Docker network)
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
      # URL Next.js Server Components / SSR dùng (gọi qua Docker network nội bộ)
      - INTERNAL_API_URL=http://backend:5000/api
      # Bật polling cho Next.js / Turbopack dev server trên Windows
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend

volumes:
  mysql_data_dev:
