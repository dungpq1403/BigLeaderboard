version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: solo_mysql_prod
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "33077:3306"
    volumes:
      - mysql_data_prod:/var/lib/mysql
    networks:
      - solo_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: solo_backend_prod
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DB_HOST=mysql
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
    depends_on:
      - mysql
    networks:
      - solo_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: solo_frontend_prod
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:5000/api   # gọi qua tên service trong nội bộ network
    depends_on:
      - backend
    networks:
      - solo_network

networks:
  solo_network:
    driver: bridge

volumes:
  mysql_data_prod: